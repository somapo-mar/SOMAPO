<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43E97B"/>
      <stop offset="0.45" stop-color="#38F9D7"/>
      <stop offset="1" stop-color="#4FACFE"/>
    </linearGradient>
  </defs>
  <!-- 背景グラデ -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 装飾の円 -->
  <circle cx="1080" cy="120" r="180" fill="#fff" opacity="0.12"/>
  <circle cx="120" cy="540" r="140" fill="#fff" opacity="0.10"/>
  <circle cx="240" cy="120" r="60" fill="#fff" opacity="0.10"/>

  <!-- タグ -->
  <g transform="translate(600 140)">
    <rect x="-140" y="-22" width="280" height="44" rx="22" fill="#fff" fill-opacity="0.25" stroke="#fff" stroke-opacity="0.5" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="22" font-weight="700" fill="#fff">🌈 おうちで始める、感覚あそび</text>
  </g>

  <!-- ロゴ -->
  <text x="600" y="270" text-anchor="middle" font-family="'Nunito','Helvetica Neue',sans-serif" font-size="120" font-weight="900" fill="#fff" letter-spacing="6">SOMAPO</text>

  <!-- メインコピー -->
  <text x="600" y="370" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="42" font-weight="800" fill="#fff">発達が気になるお子さんへ</text>
  <text x="600" y="430" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="42" font-weight="800" fill="#fff">自宅でできる運動100種類</text>

  <!-- サブ -->
  <text x="600" y="500" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="24" font-weight="500" fill="#fff" opacity="0.92">そわそわ・姿勢・バランス・集中…9つのお悩みから探せる</text>

  <!-- スティックマン3体（運動の象徴） -->
  <g transform="translate(420 565)">
    <circle cx="0" cy="-12" r="9" fill="#fff"/>
    <line x1="0" y1="-3" x2="0" y2="18" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="-13" y2="14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="13" y2="14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(600 565)">
    <circle cx="0" cy="-12" r="9" fill="#fff"/>
    <line x1="0" y1="-3" x2="0" y2="18" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="-15" y2="-2" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="15" y2="-2" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(780 565)">
    <circle cx="0" cy="-12" r="9" fill="#fff"/>
    <line x1="0" y1="-3" x2="0" y2="18" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="-13" y2="14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="13" y2="14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
